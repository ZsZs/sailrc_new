<mat-toolbar color="primary" data-testid="header-toolbar">
  <pp-navigate-back/>
  @if (!layoutService.isSmallDevice()) {
    <button mat-icon-button (click)="sidenavToggle()" data-testid="sidenav-toggle" class="example-icon" aria-label="Example icon-button with menu icon">
      <mat-icon>menu</mat-icon>
    </button>
    <span>{{ title }}</span>
  } @else {
    <ng-container *transloco="let t; prefix: 'navigation'">
      <div>
        <button data-testid="menu-button" mat-button [matMenuTriggerFor]="beforeMenu">
          <mat-icon>menu</mat-icon>
        </button>
        <mat-menu data-testid="menu" #beforeMenu="matMenu" xPosition="before">
          @for (item of routes; track item) {
            <button mat-menu-item [routerLink]="item.path" [ngClass]="layoutService.layoutClass()">
              <span matListItemIcon class="material-symbols-outlined">{{ item.data?.['icon'] }}</span>
              <span matListItemTitle>&nbsp;{{ t(item.title | substring: 0) }}</span>
            </button>
          }
        </mat-menu>
      </div>
    </ng-container>
    <h1>{{ title }}</h1>
  }

  <span class="toolbar-spacer"></span>
  <pp-language-selector/>
  <pp-auth-button/>
</mat-toolbar>
