networks:
  sailrc:
    driver: bridge

services:
  firebase:
    image: zsuffazs/sailrc-firebase:latest
    container_name: sailrc-firebase
    build:
      context: ../
      dockerfile: docker/firebase/Dockerfile
      args:
        - FIREBASE_VERSION=13.33.0
    stop_grace_period: 1m
    environment:
      FIREBASE_AUTH_EMULATOR_HOST: "localhost:9099"
      FIRESTORE_EMULATOR_HOST: "localhost:8080"
      PUBSUB_EMULATOR_HOST: "localhost:8085"
      FUNCTIONS_EMULATOR_HOST: "localhost:5001"
      FIREBASE_PROJECT: "sailrc-test"
      GCLOUD_PROJECT: "sailrc-test"
      FORCE_COLOR: 'true'
      DATA_DIRECTORY: "data"
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - "4000:4001" # ui
      - "4400:4401" # hub
      - "4600:4601" # logging
      - "5001:5002" # functions
      - "6002:6001" # Hosting
      - "8080:8081" # firestore
      - "8085:8086" # pubsub
      - "9000:9001" # database
      - "9099:9100" # auth
      - "9199:9200" # Storage
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8080" ]
